version: ork/1.0

metadata:
  id: {{ .ID }}
  description: Starter Ork environment
  owner:
    name: Your Name
    email: you@example.com

state:
  backend: local
  config:
    path: .ork

runners:
  local:
    type: local
    config: {}

components:
  setup:
    type: script
    runner: local
    source:
      embedded: |
        echo "message=hello from ork" >> "$ORK_OUTPUT_ENV"
    outputs:
      - name: message
    hooks:
      post_apply:
        - command: echo ${setup.outputs.message}
      post_destroy:
        - command: echo ${setup.outputs.message} and bye now!
