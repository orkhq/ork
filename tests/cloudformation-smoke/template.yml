AWSTemplateFormatVersion: "2010-09-09"
Description: Ork CloudFormation smoke test stack.

Resources:
  SmokeParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/ork/smoke/${AWS::StackName}"
      Type: String
      Value: "ork cloudformation smoke"
      Tier: Standard
      Tags:
        OrkSmoke: cloudformation

Outputs:
  ParameterName:
    Value: !Ref SmokeParameter
