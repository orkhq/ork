version: ork/1.0

metadata:
  id: terraform-smoke
  description: Local Terraform smoke test
  owner:
    name: Ork
    email: ork@example.com

state:
  backend: local
  config:
    path: .ork

runners:
  local:
    type: local
    config: {}

components:
  tf:
    type: terraform
    runner: local
    workdir: ./tests/terraform-smoke/.workdir
    source:
      embedded: |
        terraform {
          required_version = ">= 1.4.0"
        }

        resource "terraform_data" "smoke" {
          input = "ork terraform smoke"
        }
